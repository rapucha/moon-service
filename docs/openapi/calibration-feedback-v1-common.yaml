components:
  schemas:
    SchemaVersion:
      type: integer
      const: 1
    UtcInstant:
      type: string
      format: date-time
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\\.[0-9]+)?Z$"
      description: RFC 3339 UTC instant.
    LocationId:
      type: string
      description: |
        Existing provider-backed canonical ID copied from the loaded
        opportunity response. Feedback normalization and the 1-100 Unicode
        code-point bound are defined in docs/api-shape.md.
    UuidV4:
      type: string
      format: uuid
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      description: Lowercase canonical UUID version 4.
    ErrorCode:
      type: string
      enum:
        - invalid_json
        - invalid_request
        - request_too_large
        - unsupported_media_type
        - location_not_found
        - invalid_report
        - client_submission_conflict
        - rate_limited
        - feedback_unavailable
    ApiError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
          minLength: 1
        field:
          type: string
          minLength: 1
        retryAfterSeconds:
          type: integer
          minimum: 1
      allOf:
        - if:
            properties:
              code:
                const: rate_limited
            required:
              - code
          then:
            required:
              - retryAfterSeconds
          else:
            not:
              required:
                - retryAfterSeconds
