---
- name: Validate the supported host boundary
  ansible.builtin.assert:
    that:
      - ansible_facts.distribution == "Debian"
      - ansible_facts.distribution_major_version == "13"
      - ansible_facts.distribution_release == "trixie"
      - ansible_facts.architecture == "aarch64"
    fail_msg: >-
      This role supports Raspberry Pi OS Lite 64-bit based on Debian 13
      (Trixie) on ARM64 only.

- name: Validate required local inventory variables
  ansible.builtin.assert:
    that:
      - ansible_user is defined
      - (moon_service_operator_user | default('')) is match('^moonops[a-z0-9_-]{0,24}$')
      - (ansible_user | default('')) != moon_service_operator_user
      - moon_service_ops_group == "moon-service-ops"
      - moon_service_operator_public_key_file is defined
      - (moon_service_operator_public_key_file | default('')) is match('^/')
      - moon_service_image_repository == "ghcr.io/rapucha/moon-service"
      - moon_service_image_channel == "main"
      - moon_service_image_source == "https://github.com/rapucha/moon-service"
      - moon_service_github_repository == "rapucha/moon-service"
      - moon_service_github_deployment_task == "deploy:raspberry-pi"
      - moon_service_github_deployment_environment == "raspberry-pi"
      - moon_service_github_app_private_key_path == "/etc/moon-service/github-app-private-key.pem"
      - moon_service_compose_dir == "/opt/moon-service"
      - moon_service_config_dir == "/etc/moon-service"
      - moon_service_state_dir == "/var/lib/moon-service"
      - moon_service_host_port | int >= 1024
      - moon_service_host_port | int <= 65535
      - moon_service_github_report_timeout_seconds | int >= 1
      - moon_service_github_report_timeout_seconds | int <= 60
    fail_msg: >-
      Set distinct bootstrap-admin and operator users plus an absolute local
      SSH public-key path in the ignored inventory. Issue #95 uses the fixed
      Moon Service repository, group, host paths, and a callback timeout no
      longer than 60 seconds.

- name: Validate the application listener boundary
  ansible.builtin.include_tasks: validate-bind-address.yml
  vars:
    _moon_service_primary_ipv4_address: >-
      {{ (ansible_facts.default_ipv4 | default({})).address | default('') }}

- name: Record whether GitHub deployment reporting is configured
  ansible.builtin.set_fact:
    _moon_service_github_app_configuration_present: >-
      {{ (moon_service_github_app_id | string | length > 0)
         or (moon_service_github_app_installation_id | string | length > 0)
         or (moon_service_github_app_private_key_file | length > 0) }}
    _moon_service_github_reporting_enabled: >-
      {{ (moon_service_github_app_id | string | length > 0)
         and (moon_service_github_app_installation_id | string | length > 0)
         and (moon_service_github_app_private_key_file | length > 0) }}

- name: Validate GitHub deployment reporting configuration
  ansible.builtin.assert:
    that:
      - >-
        not _moon_service_github_app_configuration_present
        or _moon_service_github_reporting_enabled
      - >-
        not _moon_service_github_reporting_enabled
        or (moon_service_github_app_id | string) is match('^[0-9]+$')
      - >-
        not _moon_service_github_reporting_enabled
        or (moon_service_github_app_installation_id | string) is match('^[0-9]+$')
      - >-
        not _moon_service_github_reporting_enabled
        or moon_service_github_app_private_key_file is match('^/')
    fail_msg: >-
      Configure the GitHub App ID, installation ID, and an absolute local PEM
      path together, or leave all three empty to disable deployment reporting.

- name: Load the dedicated operator public key from the controller
  ansible.builtin.set_fact:
    moon_service_operator_public_key: >-
      {{ lookup('ansible.builtin.file', moon_service_operator_public_key_file) | trim }}
  no_log: true

- name: Validate the dedicated operator public key
  ansible.builtin.assert:
    that:
      - >-
        moon_service_operator_public_key is match(
          '^(ssh-(ed25519|rsa)|ecdsa-sha2-nistp(256|384|521)|sk-(ssh-ed25519|ecdsa-sha2-nistp256)@openssh\.com) [A-Za-z0-9+/]+={0,3}( .*)?$'
        )
    fail_msg: The configured controller file must contain exactly one OpenSSH public key.
  no_log: true

- name: Load the GitHub App private key from the controller
  ansible.builtin.set_fact:
    _moon_service_github_app_private_key: >-
      {{ lookup('ansible.builtin.file', moon_service_github_app_private_key_file) }}
  when: _moon_service_github_reporting_enabled
  no_log: true

- name: Validate the GitHub App private key envelope
  ansible.builtin.assert:
    that:
      - >-
        _moon_service_github_app_private_key
        is match('^-----BEGIN (RSA )?PRIVATE KEY-----')
      - >-
        _moon_service_github_app_private_key
        is search('-----END (RSA )?PRIVATE KEY-----\s*$')
    fail_msg: The configured GitHub App key must be a PEM private key.
  when: _moon_service_github_reporting_enabled
  no_log: true

- name: Remove Docker's legacy one-line repository definition
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent
  register: docker_legacy_repository

- name: Remove Tailscale's legacy one-line repository definition
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/tailscale.list
    state: absent
  register: tailscale_legacy_repository

- name: Install repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - jq
      - openssl
      - python3-apt
      - python3-debian
      - util-linux
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create APT keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Docker repository signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"
  register: docker_repository_key

- name: Configure Docker's Debian Trixie ARM64 repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - https://download.docker.com/linux/debian
    suites:
      - trixie
    components:
      - stable
    architectures:
      - arm64
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
  register: docker_repository

- name: Remove packages that conflict with Docker Engine
  ansible.builtin.apt:
    name:
      - containerd
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - runc
    state: absent

- name: Install Docker Engine and CLI plugins
  ansible.builtin.apt:
    name:
      - containerd.io
      - docker-buildx-plugin
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
    state: present
    update_cache: >-
      {{ docker_repository.changed
         or docker_repository_key.changed
         or docker_legacy_repository.changed }}

- name: Install Tailscale repository signing key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    owner: root
    group: root
    mode: "0644"
  register: tailscale_repository_key

- name: Configure Tailscale's Debian Trixie repository
  ansible.builtin.deb822_repository:
    name: tailscale
    types:
      - deb
    uris:
      - https://pkgs.tailscale.com/stable/debian
    suites:
      - trixie
    components:
      - main
    signed_by: /usr/share/keyrings/tailscale-archive-keyring.gpg
    state: present
  register: tailscale_repository

- name: Install Tailscale without enrolling the host
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: >-
      {{ tailscale_repository.changed
         or tailscale_repository_key.changed
         or tailscale_legacy_repository.changed }}

- name: Create constrained operator group
  ansible.builtin.group:
    name: "{{ moon_service_ops_group }}"
    system: true
    state: present

- name: Create and constrain the dedicated SSH operator
  ansible.builtin.user:
    name: "{{ moon_service_operator_user }}"
    comment: Moon Service constrained operator
    group: "{{ moon_service_ops_group }}"
    groups: ""
    append: false
    create_home: true
    home: "/home/{{ moon_service_operator_user }}"
    move_home: true
    shell: /bin/bash
    password_lock: true
    state: present

- name: Create the dedicated operator SSH directory
  ansible.builtin.file:
    path: "/home/{{ moon_service_operator_user }}/.ssh"
    state: directory
    owner: "{{ moon_service_operator_user }}"
    group: "{{ moon_service_ops_group }}"
    mode: "0700"

- name: Install the dedicated operator SSH public key
  ansible.builtin.copy:
    content: "{{ moon_service_operator_public_key }}\n"
    dest: "/home/{{ moon_service_operator_user }}/.ssh/authorized_keys"
    owner: "{{ moon_service_operator_user }}"
    group: "{{ moon_service_ops_group }}"
    mode: "0600"
  no_log: true

- name: Create deployment directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ moon_service_compose_dir }}"
      mode: "0755"
    - path: "{{ moon_service_config_dir }}"
      mode: "0700"
    - path: "{{ moon_service_state_dir }}"
      mode: "0700"

- name: Create service configuration drop-in directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/docker
    - /etc/systemd/journald.conf.d

- name: Install the GitHub App private key for the root-only reporter
  ansible.builtin.copy:
    content: "{{ _moon_service_github_app_private_key }}\n"
    dest: "{{ moon_service_github_app_private_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when: _moon_service_github_reporting_enabled
  no_log: true
  diff: false

- name: Remove the reporter private key when reporting is disabled
  ansible.builtin.file:
    path: "{{ moon_service_github_app_private_key_path }}"
    state: absent
  when: not _moon_service_github_reporting_enabled

- name: Create the root Docker client configuration directory
  ansible.builtin.file:
    path: /root/.docker
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Configure bounded Docker daemon logging
  ansible.builtin.template:
    src: docker-daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    validate: /usr/bin/dockerd --validate --config-file %s
  notify: Restart Docker

- name: Configure bounded system journal storage
  ansible.builtin.template:
    src: journald-moon-service.conf.j2
    dest: /etc/systemd/journald.conf.d/60-moon-service.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-journald

- name: Probe the managed Compose definition
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ moon_service_compose_dir }}/compose.yml"
    owner: root
    group: root
    mode: "0644"
  check_mode: true
  diff: false
  register: _moon_service_compose_definition_probe

- name: Inspect deployment state before changing Compose
  ansible.builtin.stat:
    path: "{{ moon_service_state_dir }}/current.env"
  register: _moon_service_preconfiguration_current_deployment_state

- name: Inspect pending host-configuration remediation state
  ansible.builtin.stat:
    path: "{{ moon_service_state_dir }}/host-configuration-remediation"
  register: _moon_service_host_configuration_remediation_state

- name: Inspect the current container port bindings
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - "{{ '{{json .HostConfig.PortBindings}}' }}"
      - moon-service
  register: _moon_service_current_container_port_bindings_result
  changed_when: false
  failed_when: false
  when: _moon_service_preconfiguration_current_deployment_state.stat.exists
  check_mode: false

- name: Select the current container port-binding result
  ansible.builtin.set_fact:
    _moon_service_container_port_bindings_result: >-
      {{ _moon_service_current_container_port_bindings_result }}

- name: Evaluate the current container port bindings
  ansible.builtin.include_tasks: container-port-bindings-state.yml

- name: Record whether host configuration requires remediation
  ansible.builtin.set_fact:
    _moon_service_host_configuration_remediation_required: >-
      {{ _moon_service_host_configuration_remediation_state.stat.exists
         or (_moon_service_preconfiguration_current_deployment_state.stat.exists
             and (_moon_service_compose_definition_probe.changed
                  or (_moon_service_current_container_port_bindings_result.rc
                      | default(1)) != 0
                  or not _moon_service_container_port_bindings_match)) }}

- name: Persist fail-closed host-configuration remediation state
  ansible.builtin.copy:
    dest: "{{ moon_service_state_dir }}/host-configuration-remediation"
    content: |
      Host-configuration remediation must complete before deployment automation is enabled.
    owner: root
    group: root
    mode: "0600"
  when:
    - _moon_service_host_configuration_remediation_required
    - not ansible_check_mode

- name: Pause automatic deployment before changing host configuration
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - moon-service-deploy.timer
    - moon-service-cleanup.timer
  when:
    - _moon_service_host_configuration_remediation_required
    - not ansible_check_mode

- name: Disable boot deployment before changing host configuration
  ansible.builtin.systemd_service:
    name: moon-service-deploy.service
    enabled: false
  when:
    - _moon_service_host_configuration_remediation_required
    - not ansible_check_mode

- name: Wait for in-flight deployment work before changing host configuration
  ansible.builtin.command:
    argv:
      - /usr/bin/flock
      - --wait
      - "600"
      - "{{ moon_service_state_dir }}/deploy.lock"
      - /usr/bin/true
  changed_when: false
  when:
    - _moon_service_host_configuration_remediation_required
    - not ansible_check_mode

- name: Install Compose definition
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ moon_service_compose_dir }}/compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Seed local application configuration without overwriting secrets
  ansible.builtin.template:
    src: application.env.j2
    dest: "{{ moon_service_config_dir }}/application.env"
    owner: root
    group: root
    mode: "0600"
    force: false

- name: Enforce local application configuration permissions
  ansible.builtin.file:
    path: "{{ moon_service_config_dir }}/application.env"
    state: file
    owner: root
    group: root
    mode: "0600"

- name: Install non-secret deployment configuration
  ansible.builtin.template:
    src: host.env.j2
    dest: "{{ moon_service_config_dir }}/host.env"
    owner: root
    group: root
    mode: "0644"

- name: Install deployment command
  ansible.builtin.copy:
    src: moon-service-deploy
    dest: /usr/local/sbin/moon-service-deploy
    owner: root
    group: root
    mode: "0755"

- name: Install GitHub deployment reporting command
  ansible.builtin.copy:
    src: moon-service-github-report
    dest: /usr/local/sbin/moon-service-github-report
    owner: root
    group: root
    mode: "0755"

- name: Install constrained operator command
  ansible.builtin.copy:
    src: moon-service-control
    dest: /usr/local/sbin/moon-service-control
    owner: root
    group: root
    mode: "0755"

- name: Install constrained sudo policy
  ansible.builtin.template:
    src: moon-service-sudoers.j2
    dest: /etc/sudoers.d/moon-service-ops
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s

- name: Install deployment and cleanup service units
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - moon-service-deploy.service
    - moon-service-cleanup.service
  notify: Reload systemd

- name: Install the deployment timer
  ansible.builtin.template:
    src: moon-service-deploy.timer.j2
    dest: /etc/systemd/system/moon-service-deploy.timer
    owner: root
    group: root
    mode: "0644"
  register: _moon_service_deploy_timer_definition
  notify: Reload systemd

- name: Install the cleanup timer
  ansible.builtin.template:
    src: moon-service-cleanup.timer.j2
    dest: /etc/systemd/system/moon-service-cleanup.timer
    owner: root
    group: root
    mode: "0644"
  register: _moon_service_cleanup_timer_definition
  notify: Reload systemd

- name: Apply service configuration before enabling automation
  ansible.builtin.meta: flush_handlers

- name: Enable Docker and the unenrolled Tailscale daemon
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - docker.service
    - tailscaled.service

- name: Inspect the memory-cgroup host state
  ansible.builtin.include_tasks: memory-cgroup-state.yml
  vars:
    _moon_service_memory_cgroup_boot_cmdline_path: /boot/firmware/cmdline.txt
    _moon_service_memory_cgroup_runtime_cmdline_path: /proc/cmdline
    _moon_service_memory_cgroup_controllers_path: /sys/fs/cgroup/cgroup.controllers
    _moon_service_memory_cgroup_require_active: false

- name: Inspect the recorded deployment state
  ansible.builtin.stat:
    path: "{{ moon_service_state_dir }}/current.env"
  register: _moon_service_current_deployment_state

- name: Inspect pending memory-limit remediation state
  ansible.builtin.stat:
    path: "{{ moon_service_state_dir }}/memory-limit-remediation"
  register: _moon_service_memory_remediation_state

- name: Inspect the current container memory limit
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - "{{ '{{.HostConfig.Memory}}' }}"
      - moon-service
  register: _moon_service_current_container_memory
  changed_when: false
  failed_when: false
  when: _moon_service_current_deployment_state.stat.exists
  check_mode: false

- name: Inspect Docker memory-limit support before remediation
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{.MemoryLimit}}' }}"
  register: _moon_service_initial_docker_memory_limit
  changed_when: false
  failed_when: false
  check_mode: false

- name: Record the required deployment remediation
  ansible.builtin.set_fact:
    _moon_service_expected_container_memory: >-
      {{ moon_service_container_memory | human_to_bytes }}
    _moon_service_docker_memory_support_active: >-
      {{ (_moon_service_initial_docker_memory_limit.rc | default(1)) == 0
         and (_moon_service_initial_docker_memory_limit.stdout | default('')) == 'true' }}
    _moon_service_initial_container_recreate_required: >-
      {{ _moon_service_current_deployment_state.stat.exists
         and (_moon_service_memory_remediation_state.stat.exists
              or not _moon_service_memory_controller_active
              or (_moon_service_current_container_memory.rc | default(1)) != 0
              or ((_moon_service_current_container_memory.stdout | default('0') | int)
                  != (moon_service_container_memory | human_to_bytes | int))) }}

- name: Record whether memory-limit remediation is required
  ansible.builtin.set_fact:
    _moon_service_memory_remediation_required: >-
      {{ _moon_service_memory_cgroup_reboot_required
         or not _moon_service_memory_controller_active
         or not _moon_service_docker_memory_support_active
         or _moon_service_initial_container_recreate_required
         or _moon_service_memory_remediation_state.stat.exists }}
    _moon_service_memory_cgroup_reboot_planned: >-
      {{ _moon_service_memory_cgroup_reboot_required }}

- name: Record whether deployment automation must be paused
  ansible.builtin.set_fact:
    _moon_service_deployment_remediation_required: >-
      {{ _moon_service_memory_remediation_required
         or _moon_service_host_configuration_remediation_required }}

- name: Persist fail-closed memory-limit remediation state
  ansible.builtin.copy:
    dest: "{{ moon_service_state_dir }}/memory-limit-remediation"
    content: >-
      Memory-limit remediation must complete before deployment automation is enabled.
    owner: root
    group: root
    mode: "0600"
  when:
    - _moon_service_memory_remediation_required
    - not ansible_check_mode

- name: Pause automatic deployment during host remediation
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - moon-service-deploy.timer
    - moon-service-cleanup.timer
  when:
    - _moon_service_deployment_remediation_required
    - not ansible_check_mode

- name: Disable boot deployment during host remediation
  ansible.builtin.systemd_service:
    name: moon-service-deploy.service
    enabled: false
  when:
    - _moon_service_deployment_remediation_required
    - not ansible_check_mode

- name: Request the controlled memory-cgroup reboot
  ansible.builtin.debug:
    msg: Rebooting once to activate the Raspberry Pi memory cgroup controller.
  changed_when: true
  notify: Activate Moon Service memory cgroup
  when:
    - _moon_service_memory_cgroup_reboot_planned
    - not ansible_check_mode

- name: Apply the controlled memory-cgroup reboot
  ansible.builtin.meta: flush_handlers

- name: Wait for any in-flight deployment to finish
  ansible.builtin.command:
    argv:
      - /usr/bin/flock
      - --wait
      - "600"
      - "{{ moon_service_state_dir }}/deploy.lock"
      - /usr/bin/true
  changed_when: false
  when:
    - _moon_service_deployment_remediation_required
    - not ansible_check_mode

- name: Verify the active memory-cgroup host state
  ansible.builtin.include_tasks: memory-cgroup-state.yml
  vars:
    _moon_service_memory_cgroup_boot_cmdline_path: /boot/firmware/cmdline.txt
    _moon_service_memory_cgroup_runtime_cmdline_path: /proc/cmdline
    _moon_service_memory_cgroup_controllers_path: /sys/fs/cgroup/cgroup.controllers
    _moon_service_memory_cgroup_require_active: >-
      {{ not (ansible_check_mode and _moon_service_memory_cgroup_reboot_planned) }}

- name: Reconfirm required daemons after host remediation
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - docker.service
    - tailscaled.service

- name: Verify Docker detected memory-limit support
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{.MemoryLimit}}' }}"
  register: _moon_service_docker_memory_limit
  changed_when: false
  check_mode: false
  when: not (ansible_check_mode and _moon_service_memory_cgroup_reboot_planned)

- name: Require Docker memory-limit support
  ansible.builtin.assert:
    that:
      - _moon_service_docker_memory_limit.stdout == "true"
    fail_msg: >-
      Docker did not detect kernel memory-limit support. Refusing to enable
      deployment automation without the configured container memory boundary.
  when: not (ansible_check_mode and _moon_service_memory_cgroup_reboot_planned)

- name: Refresh deployment state after pausing automatic work
  ansible.builtin.include_tasks: deployment-recreation-state.yml

- name: Recreate an existing deployment with managed host configuration
  ansible.builtin.command:
    argv:
      - /usr/local/sbin/moon-service-deploy
      - restart
  environment:
    MOON_OPERATOR_LOCK_TIMEOUT_SECONDS: "600"
  when:
    - _moon_service_container_recreate_required
    - not ansible_check_mode

- name: Inspect the converged container memory limit
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - "{{ '{{.HostConfig.Memory}}' }}"
      - moon-service
  register: _moon_service_converged_container_memory
  changed_when: false
  failed_when: false
  when:
    - _moon_service_converged_deployment_state.stat.exists
    - not ansible_check_mode

- name: Inspect the converged container port bindings
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - "{{ '{{json .HostConfig.PortBindings}}' }}"
      - moon-service
  register: _moon_service_converged_container_port_bindings_result
  changed_when: false
  failed_when: false
  when:
    - _moon_service_converged_deployment_state.stat.exists
    - not ansible_check_mode

- name: Select the converged container port-binding result
  ansible.builtin.set_fact:
    _moon_service_container_port_bindings_result: >-
      {{ _moon_service_converged_container_port_bindings_result }}
  when:
    - _moon_service_converged_deployment_state.stat.exists
    - not ansible_check_mode

- name: Evaluate the converged container port bindings
  ansible.builtin.include_tasks: container-port-bindings-state.yml
  when:
    - _moon_service_converged_deployment_state.stat.exists
    - not ansible_check_mode

- name: Require the exact configured container memory limit
  ansible.builtin.assert:
    that:
      - _moon_service_converged_container_memory.rc == 0
      - >-
        (_moon_service_converged_container_memory.stdout | int)
        == (_moon_service_expected_container_memory | int)
    fail_msg: >-
      The recorded Moon Service deployment does not enforce the exact
      configured memory limit. Deployment automation remains disabled.
  when:
    - _moon_service_converged_deployment_state.stat.exists
    - not ansible_check_mode

- name: Require the exact configured container port binding
  ansible.builtin.assert:
    that:
      - _moon_service_converged_container_port_bindings_result.rc == 0
      - _moon_service_container_port_bindings_match
    fail_msg: >-
      The recorded Moon Service deployment does not enforce the exact
      configured host listener. Deployment automation remains disabled.
  when:
    - _moon_service_converged_deployment_state.stat.exists
    - not ansible_check_mode

- name: Clear completed memory-limit remediation state
  ansible.builtin.file:
    path: "{{ moon_service_state_dir }}/memory-limit-remediation"
    state: absent
  when:
    - _moon_service_memory_remediation_required
    - not ansible_check_mode

- name: Clear completed host-configuration remediation state
  ansible.builtin.file:
    path: "{{ moon_service_state_dir }}/host-configuration-remediation"
    state: absent
  when:
    - _moon_service_host_configuration_remediation_required
    - not ansible_check_mode

- name: Enable deployment on boot
  ansible.builtin.systemd_service:
    name: moon-service-deploy.service
    enabled: true

- name: Inspect timer scheduling state before enabling automation
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - "{{ item }}"
      - --property=SubState
      - --value
  loop:
    - moon-service-deploy.timer
    - moon-service-cleanup.timer
  register: _moon_service_timer_scheduling_state
  changed_when: false
  failed_when: false
  check_mode: false

- name: Rearm changed or exhausted automation timers
  ansible.builtin.systemd_service:
    name: "{{ item.name }}"
    enabled: true
    state: restarted
  loop:
    - name: moon-service-deploy.timer
      definition_changed: "{{ _moon_service_deploy_timer_definition.changed }}"
      prior_substate: >-
        {{ (_moon_service_timer_scheduling_state.results
            | selectattr('item', 'equalto', 'moon-service-deploy.timer')
            | map(attribute='stdout')
            | first) | default('unknown') }}
    - name: moon-service-cleanup.timer
      definition_changed: "{{ _moon_service_cleanup_timer_definition.changed }}"
      prior_substate: >-
        {{ (_moon_service_timer_scheduling_state.results
            | selectattr('item', 'equalto', 'moon-service-cleanup.timer')
            | map(attribute='stdout')
            | first) | default('unknown') }}
  when:
    - not ansible_check_mode
    - (item.definition_changed | bool) or item.prior_substate == "elapsed"

- name: Enable automatic deployment and cleanup timers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - moon-service-deploy.timer
    - moon-service-cleanup.timer

- name: Catch up immediately after repairing deployment scheduling
  ansible.builtin.systemd_service:
    name: moon-service-deploy.service
    state: started
  when:
    - not ansible_check_mode
    - >-
      _moon_service_deploy_timer_definition.changed
      or _moon_service_deployment_remediation_required
      or ((_moon_service_timer_scheduling_state.results
           | selectattr('item', 'equalto', 'moon-service-deploy.timer')
           | map(attribute='stdout')
           | first) | default('unknown')) == 'elapsed'

- name: Inspect the enabled automation timer schedules
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - "{{ item }}"
      - --property=ActiveState
      - --property=SubState
      - --property=NextElapseUSecMonotonic
  loop:
    - moon-service-deploy.timer
    - moon-service-cleanup.timer
  register: _moon_service_enabled_timer_schedules
  changed_when: false
  check_mode: false
  when: not ansible_check_mode

- name: Require finite waiting automation timer schedules
  ansible.builtin.assert:
    that:
      - "'ActiveState=active' in item.stdout_lines"
      - "'SubState=waiting' in item.stdout_lines"
      - >-
        (item.stdout_lines
         | select('match', '^NextElapseUSecMonotonic=.+$')
         | reject('equalto', 'NextElapseUSecMonotonic=infinity')
         | list
         | length) == 1
    fail_msg: >-
      {{ item.item }} did not rearm with a finite monotonic deadline;
      deployment automation remains unhealthy.
  loop: "{{ _moon_service_enabled_timer_schedules.results }}"
  when: not ansible_check_mode
