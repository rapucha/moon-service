---
all:
  hosts:
    moon-pi:
      ansible_host: REPLACE_WITH_PI_LAN_ADDRESS
      ansible_user: REPLACE_WITH_BOOTSTRAP_ADMIN
      moon_service_operator_user: moonops
      moon_service_operator_public_key_file: REPLACE_WITH_ABSOLUTE_LOCAL_PUBLIC_KEY_PATH
      # Required trusted-LAN listener; must equal this host's active primary IPv4.
      moon_service_bind_address: REPLACE_WITH_PI_LAN_ADDRESS
      # Optional exact deployment acknowledgement; configure all three after
      # installing a repo-only GitHub App with Deployments read/write.
      # moon_service_github_app_id: REPLACE_WITH_GITHUB_APP_ID
      # moon_service_github_app_installation_id: REPLACE_WITH_INSTALLATION_ID
      # moon_service_github_app_private_key_file: REPLACE_WITH_ABSOLUTE_LOCAL_PEM_PATH
      # Optional pull-request preview storage. The tracked example is disabled
      # and uses a documentation-only address, never a real private endpoint.
      moon_service_preview_storage_enabled: false
      moon_service_preview_storage_server: 192.0.2.38
      moon_service_preview_storage_export: REPLACE_WITH_NFS_EXPORT_PATH
      moon_service_preview_storage_confirm_client_allowlist: false
      moon_service_preview_storage_confirm_root_squash: false
      moon_service_preview_storage_confirm_sync: false
      moon_service_preview_storage_confirm_trusted_lan: false
      # Optional pull-request preview runtime assets. This only renders the
      # disabled local Compose project and installs its root-only control
      # helper. It does not select a candidate or start containers.
      moon_service_preview_runtime_enabled: false
