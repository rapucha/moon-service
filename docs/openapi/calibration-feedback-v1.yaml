openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Moon Service calibration feedback API
  version: 1.0.0
  description: |
    Hand-authored wire contract for calibration feedback version 1.
    Behavioral rules that do not fit OpenAPI live in docs/api-shape.md.
servers:
  - url: /
tags:
  - name: Calibration feedback
    description: Disabled-by-default alpha feedback collection.
paths:
  /api/calibration-feedback/v1/capability:
    get:
      tags:
        - Calibration feedback
      operationId: getCalibrationFeedbackCapability
      summary: Read feedback feature availability
      description: |
        Always returns the public feature and operation states. It does not
        expose database, resolver, provider, capacity, or failure details.
      responses:
        "200":
          description: Current public capability.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityResponse"
  /api/calibration-feedback/v1/preview:
    post:
      tags:
        - Calibration feedback
      operationId: previewCalibrationFeedback
      summary: Reconstruct astronomy without saving feedback
      description: |
        Resolves the selected canonical city and reconstructs Moon, Sun, and
        light facts. It accepts no ratings, notes, recommendation snapshot, or
        client preview facts. It calls no weather provider and creates no
        feedback record.
      x-body-limit-bytes: 4096
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/PreviewRequest"
      responses:
        "200":
          description: Astronomy reconstruction for the accepted city and time.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/PreviewResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/RequestTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/PreviewUnprocessableRequest"
        "429":
          $ref: "#/components/responses/PreviewLimited"
        "503":
          $ref: "#/components/responses/FeedbackUnavailable"
  /api/calibration-feedback/v1/submissions:
    post:
      tags:
        - Calibration feedback
      operationId: submitCalibrationFeedback
      summary: Submit one logical calibration report
      description: |
        Same-origin browser use only. The route sends no permissive CORS
        headers and supports no cross-origin preflight. Exact replay and UUID
        conflict checks happen before another city resolution. A new report
        resolves the city and recomputes astronomy before persistence.
      x-body-limit-bytes: 16384
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./calibration-feedback-v1-submission.yaml#/components/schemas/SubmissionRequest"
      responses:
        "200":
          description: Exact replay of an existing logical report.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "./calibration-feedback-v1-submission.yaml#/components/schemas/ReplayedSubmissionResponse"
        "201":
          description: New report accepted and stored.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "./calibration-feedback-v1-submission.yaml#/components/schemas/CreatedSubmissionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/SubmissionConflict"
        "413":
          $ref: "#/components/responses/RequestTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/SubmissionUnprocessableRequest"
        "429":
          $ref: "#/components/responses/SubmissionLimited"
        "503":
          $ref: "#/components/responses/FeedbackUnavailable"
components:
  schemas:
    CapabilityResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - serverTime
        - featureState
        - previewAvailability
        - submissionAvailability
      properties:
        schemaVersion:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/SchemaVersion"
        serverTime:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/UtcInstant"
        featureState:
          type: string
          enum:
            - enabled
            - disabled
        previewAvailability:
          type: string
          enum:
            - available
            - disabled
            - unavailable
        submissionAvailability:
          type: string
          enum:
            - available
            - disabled
            - unavailable
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - serverTime
        - error
      properties:
        schemaVersion:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/SchemaVersion"
        serverTime:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/UtcInstant"
        error:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/ApiError"
    BadRequestErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - properties:
            error:
              properties:
                code:
                  enum:
                    - invalid_json
                    - invalid_request
    RequestTooLargeErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - properties:
            error:
              properties:
                code:
                  const: request_too_large
    UnsupportedMediaTypeErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - properties:
            error:
              properties:
                code:
                  const: unsupported_media_type
    SubmissionUnprocessableErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - properties:
            error:
              properties:
                code:
                  enum:
                    - location_not_found
                    - invalid_report
                    - future_time
                    - nonexistent_local_time
                    - ambiguous_local_time
                    - invalid_utc_offset
    PreviewUnprocessableErrorResponse:
      allOf:
        - $ref: "#/components/schemas/SubmissionUnprocessableErrorResponse"
        - properties:
            error:
              properties:
                code:
                  not:
                    const: invalid_report
    ConflictErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - properties:
            error:
              properties:
                code:
                  const: client_submission_conflict
    PreviewLimitedErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - properties:
            error:
              properties:
                code:
                  enum:
                    - rate_limited
                    - preview_busy
    SubmissionLimitedErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - properties:
            error:
              properties:
                code:
                  const: rate_limited
    UnavailableErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - properties:
            error:
              properties:
                code:
                  const: feedback_unavailable
  headers:
    NoStore:
      description: Feedback responses are never cacheable.
      required: true
      schema:
        type: string
        const: no-store
    RetryAfter:
      description: Whole seconds until another explicit attempt may be made.
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequest:
      description: |
        Malformed JSON or invalid schema version, member, type, UUID, enum,
        format, numeric range, or location-ID syntax.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequestErrorResponse"
    RequestTooLarge:
      description: The route's received-byte limit was exceeded.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RequestTooLargeErrorResponse"
    UnsupportedMediaType:
      description: The media type or content encoding is unsupported.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnsupportedMediaTypeErrorResponse"
    PreviewUnprocessableRequest:
      description: |
        A selected city no longer resolves, or timing or chronology is
        semantically invalid.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PreviewUnprocessableErrorResponse"
    SubmissionUnprocessableRequest:
      description: |
        A selected city no longer resolves, or timing, report content, or
        chronology is semantically invalid.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubmissionUnprocessableErrorResponse"
    SubmissionConflict:
      description: The client submission UUID names different normalized content.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConflictErrorResponse"
    PreviewLimited:
      description: The preview token bucket or single calculation permit rejected the request.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PreviewLimitedErrorResponse"
    SubmissionLimited:
      description: The global submission token bucket rejected the request.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubmissionLimitedErrorResponse"
    FeedbackUnavailable:
      description: The requested feedback operation is disabled or unavailable.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnavailableErrorResponse"
