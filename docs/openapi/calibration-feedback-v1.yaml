openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Moon Service calibration feedback API
  version: 1.0.0
  description: |
    Hand-authored wire contract for reduced current-observation calibration
    feedback version 1. Behavioral rules that do not fit OpenAPI live in
    docs/api-shape.md.
servers:
  - url: /
tags:
  - name: Calibration feedback
    description: Disabled-by-default alpha feedback collection.
paths:
  /api/calibration-feedback/v1/capability:
    get:
      tags:
        - Calibration feedback
      operationId: getCalibrationFeedbackCapability
      summary: Read feedback submission availability
      description: |
        Always returns the public feature and submission states. It does not
        expose database, resolver, provider, capacity, or failure details.
      responses:
        "200":
          description: Current public capability.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityResponse"
  /api/calibration-feedback/v1/submissions:
    post:
      tags:
        - Calibration feedback
      operationId: submitCalibrationFeedback
      summary: Submit one current calibration report
      description: |
        Same-origin browser use only. The route sends no permissive CORS
        headers and supports no cross-origin preflight. Exact replay and UUID
        conflict checks happen before another city resolution or write-token
        admission. A new report resolves the city and recomputes current
        astronomy before persistence.
      x-body-limit-bytes: 16384
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./calibration-feedback-v1-submission.yaml#/components/schemas/SubmissionRequest"
      responses:
        "200":
          description: Exact replay of an existing logical report.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "./calibration-feedback-v1-submission.yaml#/components/schemas/ReplayedSubmissionResponse"
        "201":
          description: New report accepted and stored.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "./calibration-feedback-v1-submission.yaml#/components/schemas/CreatedSubmissionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/SubmissionConflict"
        "413":
          $ref: "#/components/responses/RequestTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/SubmissionUnprocessableRequest"
        "429":
          $ref: "#/components/responses/SubmissionLimited"
        "503":
          $ref: "#/components/responses/FeedbackUnavailable"
components:
  schemas:
    CapabilityResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - serverTime
        - featureState
        - submissionAvailability
      properties:
        schemaVersion:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/SchemaVersion"
        serverTime:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/UtcInstant"
        featureState:
          type: string
          enum:
            - enabled
            - disabled
        submissionAvailability:
          type: string
          enum:
            - available
            - disabled
            - unavailable
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - serverTime
        - error
      properties:
        schemaVersion:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/SchemaVersion"
        serverTime:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/UtcInstant"
        error:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/ApiError"
    BadRequestErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              type: object
              properties:
                code:
                  enum:
                    - invalid_json
                    - invalid_request
    RequestTooLargeErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              type: object
              properties:
                code:
                  const: request_too_large
    UnsupportedMediaTypeErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              type: object
              properties:
                code:
                  const: unsupported_media_type
    SubmissionUnprocessableErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              type: object
              properties:
                code:
                  enum:
                    - location_not_found
                    - invalid_report
    ConflictErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              type: object
              properties:
                code:
                  const: client_submission_conflict
    SubmissionLimitedErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              type: object
              properties:
                code:
                  const: rate_limited
    UnavailableErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            error:
              type: object
              properties:
                code:
                  const: feedback_unavailable
  headers:
    NoStore:
      description: Feedback responses are never cacheable.
      required: true
      schema:
        type: string
        const: no-store
    RetryAfter:
      description: Whole seconds until another explicit attempt may be made.
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequest:
      description: |
        Malformed JSON or an invalid schema version, member, type, UUID, enum,
        Unicode string, or identifier syntax.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequestErrorResponse"
    RequestTooLarge:
      description: The 16,384-byte received-body limit was exceeded.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RequestTooLargeErrorResponse"
    UnsupportedMediaType:
      description: The media type or content encoding is unsupported.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnsupportedMediaTypeErrorResponse"
    SubmissionUnprocessableRequest:
      description: |
        The selected city no longer resolves, or the normalized feedback
        report has no valid evidence or otherwise violates a semantic rule.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubmissionUnprocessableErrorResponse"
    SubmissionConflict:
      description: The client submission UUID names different normalized content.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConflictErrorResponse"
    SubmissionLimited:
      description: The instance-global submission token bucket rejected the request.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubmissionLimitedErrorResponse"
    FeedbackUnavailable:
      description: |
        Feedback is disabled or a required resolver, astronomy, or persistence
        operation is unavailable. The response does not identify the cause.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnavailableErrorResponse"
