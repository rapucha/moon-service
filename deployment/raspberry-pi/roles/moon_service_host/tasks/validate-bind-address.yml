---
- name: Require the explicitly configured primary IPv4 application listener
  ansible.builtin.assert:
    that:
      - moon_service_bind_address != '127.0.0.1'
      - moon_service_bind_address == _moon_service_primary_ipv4_address
    fail_msg: >-
      moon_service_bind_address must be explicitly configured as the managed
      host's active primary IPv4 address. Loopback is added separately;
      wildcard, loopback-only, and secondary-interface listeners are not
      accepted.
