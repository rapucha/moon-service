name: Test and publish container

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: moon-service-ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_SOURCE: ${{ github.server_url }}/${{ github.repository }}

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25.0.3+9'
          cache: maven
          cache-dependency-path: |
            pom.xml
            backend/pom.xml
            prototypes/jvm-scoring/pom.xml

      - name: Run backend tests
        run: mvn --batch-mode --no-transfer-progress test -pl backend -am

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java for the Playwright server
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25.0.3+9'
          cache: maven
          cache-dependency-path: |
            pom.xml
            backend/pom.xml
            prototypes/jvm-scoring/pom.xml

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify hosted Chrome
        run: test -x /usr/bin/google-chrome

      - name: Run frontend checks
        run: npm run frontend:ci

  deployment-tests:
    name: Deployment tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check deployment shell syntax
        run: |
          bash -n deployment/raspberry-pi/roles/moon_service_host/files/moon-service-deploy
          bash -n deployment/raspberry-pi/roles/moon_service_host/files/moon-service-github-report
          bash -n deployment/raspberry-pi/roles/moon_service_host/files/moon-service-control

      - name: Install pinned Ansible Core
        run: |
          python3 -m venv /tmp/moon-service-ansible
          /tmp/moon-service-ansible/bin/pip install \
            --disable-pip-version-check --no-input \
            --requirement deployment/raspberry-pi/ci-requirements.txt

      - name: Check Ansible role syntax
        working-directory: deployment/raspberry-pi
        run: |
          /tmp/moon-service-ansible/bin/ansible-playbook \
            --inventory tests/inventory.syntax.yml \
            --syntax-check site.yml

      - name: Test memory-cgroup provisioning state
        working-directory: deployment/raspberry-pi
        run: |
          /tmp/moon-service-ansible/bin/ansible-playbook \
            --inventory localhost, \
            --connection local \
            tests/memory-cgroup.runtime.yml

      - name: Test application listener boundary
        working-directory: deployment/raspberry-pi
        run: |
          /tmp/moon-service-ansible/bin/ansible-playbook \
            --inventory localhost, \
            --connection local \
            tests/bind-address.runtime.yml

      - name: Validate rendered Compose definition
        run: |
          sed \
            -e 's#{{ moon_service_config_dir }}/application.env#/dev/null#g' \
            -e 's#{{ moon_service_bind_address }}#127.0.0.1#g' \
            -e 's#{{ moon_service_host_port }}#8080#g' \
            -e 's#{{ moon_service_container_pids }}#256#g' \
            -e 's#{{ moon_service_container_memory }}#1536m#g' \
            -e 's#{{ moon_service_container_cpus }}#2.0#g' \
            -e 's#{{ moon_service_docker_log_max_size }}#10m#g' \
            -e 's#{{ moon_service_docker_log_max_files }}#3#g' \
            deployment/raspberry-pi/roles/moon_service_host/templates/compose.yml.j2 \
            | env \
                MOON_IMAGE_REPOSITORY=ghcr.io/rapucha/moon-service \
                MOON_IMAGE_DIGEST=sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
                MOON_IMAGE_REVISION=1111111111111111111111111111111111111111 \
                docker compose --file - config --quiet

      - name: Validate rendered LAN Compose definition
        run: |
          sed \
            -e 's#{{ moon_service_config_dir }}/application.env#/dev/null#g' \
            -e 's#{{ moon_service_bind_address }}#192.0.2.10#g' \
            -e 's#{{ moon_service_host_port }}#8080#g' \
            -e 's#{{ moon_service_container_pids }}#256#g' \
            -e 's#{{ moon_service_container_memory }}#1536m#g' \
            -e 's#{{ moon_service_container_cpus }}#2.0#g' \
            -e 's#{{ moon_service_docker_log_max_size }}#10m#g' \
            -e 's#{{ moon_service_docker_log_max_files }}#3#g' \
            deployment/raspberry-pi/roles/moon_service_host/templates/compose.yml.j2 \
            | env \
                MOON_IMAGE_REPOSITORY=ghcr.io/rapucha/moon-service \
                MOON_IMAGE_DIGEST=sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
                MOON_IMAGE_REVISION=1111111111111111111111111111111111111111 \
                docker compose --file - config --quiet

      - name: Test deployment state transitions
        run: python3 -m unittest discover -s deployment/raspberry-pi/tests -v

  publish-image:
    name: Publish immutable image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend-tests
      - frontend-tests
      - deployment-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    concurrency:
      group: moon-service-ghcr-${{ github.sha }}
      cancel-in-progress: false
    outputs:
      digest: ${{ steps.verify-image.outputs.digest }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Check immutable revision tag
        id: existing-image
        env:
          IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          set -euo pipefail
          error_file="$(mktemp)"
          trap 'rm -f "$error_file"' EXIT

          if manifest_json="$(docker buildx imagetools inspect \
              "$IMAGE_REF" --format '{{json .Manifest}}' 2>"$error_file")"; then
            digest="$(jq -er '.digest | select(test("^sha256:[0-9a-f]{64}$"))' <<<"$manifest_json")"
            revision="$(jq -er '.annotations["org.opencontainers.image.revision"]' <<<"$manifest_json")"
            source="$(jq -er '.annotations["org.opencontainers.image.source"]' <<<"$manifest_json")"
            [[ "$revision" == "$GITHUB_SHA" ]]
            [[ "$source" == "$IMAGE_SOURCE" ]]
            echo "exists=true" >>"$GITHUB_OUTPUT"
            echo "digest=$digest" >>"$GITHUB_OUTPUT"
            echo "Reusing existing immutable image $IMAGE_REF@$digest"
          elif grep -Eqi '(manifest unknown|not found)' "$error_file"; then
            echo "exists=false" >>"$GITHUB_OUTPUT"
            echo "No immutable image exists yet for $GITHUB_SHA"
          else
            cat "$error_file" >&2
            exit 1
          fi

      - name: Build AMD64 smoke image
        if: steps.existing-image.outputs.exists != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          load: true
          tags: moon-service-ci:${{ github.sha }}-amd64
          build-args: |
            MOON_BUILD_REVISION=${{ github.sha }}
            MOON_IMAGE_SOURCE=${{ env.IMAGE_SOURCE }}
          cache-from: type=gha,scope=moon-service-container
          cache-to: type=gha,mode=max,scope=moon-service-container
          provenance: false

      - name: Smoke-test AMD64 image
        if: steps.existing-image.outputs.exists != 'true'
        env:
          MOON_SERVICE_CONTAINER_PLATFORM: linux/amd64
        run: scripts/smoke_container_image.sh "moon-service-ci:$GITHUB_SHA-amd64" "$GITHUB_SHA"

      - name: Build ARM64 smoke image
        if: steps.existing-image.outputs.exists != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/arm64
          load: true
          tags: moon-service-ci:${{ github.sha }}-arm64
          build-args: |
            MOON_BUILD_REVISION=${{ github.sha }}
            MOON_IMAGE_SOURCE=${{ env.IMAGE_SOURCE }}
          cache-from: type=gha,scope=moon-service-container
          cache-to: type=gha,mode=max,scope=moon-service-container
          provenance: false

      - name: Smoke-test ARM64 image
        if: steps.existing-image.outputs.exists != 'true'
        env:
          MOON_SERVICE_CONTAINER_PLATFORM: linux/arm64
          MOON_SERVICE_CONTAINER_START_TIMEOUT_SECONDS: '180'
        run: scripts/smoke_container_image.sh "moon-service-ci:$GITHUB_SHA-arm64" "$GITHUB_SHA"

      - name: Publish immutable multi-architecture image
        id: publish-image
        if: steps.existing-image.outputs.exists != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            MOON_BUILD_REVISION=${{ github.sha }}
            MOON_IMAGE_SOURCE=${{ env.IMAGE_SOURCE }}
          annotations: |
            index:org.opencontainers.image.revision=${{ github.sha }}
            index:org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}
          cache-from: type=gha,scope=moon-service-container
          cache-to: type=gha,mode=max,scope=moon-service-container
          provenance: false

      - name: Verify published image
        id: verify-image
        env:
          IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          PUBLISHED_DIGEST: ${{ steps.publish-image.outputs.digest }}
        run: |
          set -euo pipefail
          manifest_json="$(docker buildx imagetools inspect \
            "$IMAGE_REF" --format '{{json .Manifest}}')"
          digest="$(jq -er '.digest | select(test("^sha256:[0-9a-f]{64}$"))' <<<"$manifest_json")"
          revision="$(jq -er '.annotations["org.opencontainers.image.revision"]' <<<"$manifest_json")"
          source="$(jq -er '.annotations["org.opencontainers.image.source"]' <<<"$manifest_json")"

          [[ "$revision" == "$GITHUB_SHA" ]]
          [[ "$source" == "$IMAGE_SOURCE" ]]
          if [[ -n "$PUBLISHED_DIGEST" ]]; then
            [[ "$digest" == "$PUBLISHED_DIGEST" ]]
          else
            [[ "$digest" == "${{ steps.existing-image.outputs.digest }}" ]]
          fi

          jq -e '
            [.manifests[].platform
              | select(.os == "linux")
              | .architecture]
            | sort == ["amd64", "arm64"]
          ' <<<"$manifest_json" >/dev/null

          for platform in linux/amd64 linux/arm64; do
            platform_digest="$(jq -er --arg platform "$platform" '
              .manifests[]
              | select((.platform.os + "/" + .platform.architecture) == $platform)
              | .digest
              | select(test("^sha256:[0-9a-f]{64}$"))
            ' <<<"$manifest_json")"
            image_json="$(docker buildx imagetools inspect "$IMAGE_REF" \
              --format "{{json (index .Image \"$platform\")}}")"
            jq -e --arg revision "$GITHUB_SHA" --arg source "$IMAGE_SOURCE" '
              .config.Labels["org.opencontainers.image.revision"] == $revision
              and .config.Labels["org.opencontainers.image.source"] == $source
              and ((.config.Env // [])
                | index("MOON_BUILD_REVISION=" + $revision) != null)
            ' <<<"$image_json" >/dev/null
            docker pull --platform "$platform" "$IMAGE_NAME@$platform_digest"
          done

          echo "digest=$digest" >>"$GITHUB_OUTPUT"
          echo "Verified $IMAGE_REF@$digest for linux/amd64 and linux/arm64"

  promote-main:
    name: Promote main image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - publish-image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      deployment_id: ${{ steps.create-deployment.outputs.deployment_id }}
      digest: ${{ steps.verify-main.outputs.digest }}
      reporter_login: ${{ steps.create-deployment.outputs.reporter_login }}
      revision: ${{ steps.verify-main.outputs.revision }}
      run_attempt: ${{ steps.create-deployment.outputs.run_attempt }}
    permissions:
      contents: read
      deployments: write
      packages: write
    concurrency:
      group: moon-service-ghcr-main-promotion
      cancel-in-progress: false
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Decide whether main can advance
        id: promotion
        env:
          CANDIDATE_DIGEST: ${{ needs.publish-image.outputs.digest }}
          MAIN_REF: ${{ env.IMAGE_NAME }}:main
        run: |
          set -euo pipefail
          [[ "$CANDIDATE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          error_file="$(mktemp)"
          trap 'rm -f "$error_file"' EXIT

          if manifest_json="$(docker buildx imagetools inspect \
              "$MAIN_REF" --format '{{json .Manifest}}' 2>"$error_file")"; then
            current_digest="$(jq -er '.digest | select(test("^sha256:[0-9a-f]{64}$"))' <<<"$manifest_json")"
            current_revision="$(jq -er '.annotations["org.opencontainers.image.revision"]' <<<"$manifest_json")"
            current_source="$(jq -er '.annotations["org.opencontainers.image.source"]' <<<"$manifest_json")"
            [[ "$current_revision" =~ ^[0-9a-f]{40}$ ]]
            [[ "$current_source" == "$IMAGE_SOURCE" ]]

            if [[ "$current_revision" == "$GITHUB_SHA" ]] \
                || git merge-base --is-ancestor "$current_revision" "$GITHUB_SHA"; then
              {
                echo "promote=true"
                echo "expected_digest=$CANDIDATE_DIGEST"
                echo "expected_revision=$GITHUB_SHA"
              } >>"$GITHUB_OUTPUT"
            elif git merge-base --is-ancestor "$GITHUB_SHA" "$current_revision"; then
              {
                echo "promote=false"
                echo "expected_digest=$current_digest"
                echo "expected_revision=$current_revision"
              } >>"$GITHUB_OUTPUT"
              echo "main already points to newer successful revision $current_revision"
            else
              echo "Current and candidate image revisions are not on one main history" >&2
              exit 1
            fi
          elif grep -Eqi '(manifest unknown|not found)' "$error_file"; then
            {
              echo "promote=true"
              echo "expected_digest=$CANDIDATE_DIGEST"
              echo "expected_revision=$GITHUB_SHA"
            } >>"$GITHUB_OUTPUT"
            echo "main image tag does not exist yet"
          else
            cat "$error_file" >&2
            exit 1
          fi

      - name: Advance main to the verified digest
        if: steps.promotion.outputs.promote == 'true'
        env:
          CANDIDATE_DIGEST: ${{ needs.publish-image.outputs.digest }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "$IMAGE_NAME:main" \
            "$IMAGE_NAME@$CANDIDATE_DIGEST"

      - name: Verify main image
        id: verify-main
        env:
          EXPECTED_DIGEST: ${{ steps.promotion.outputs.expected_digest }}
          EXPECTED_REVISION: ${{ steps.promotion.outputs.expected_revision }}
        run: |
          set -euo pipefail
          manifest_json="$(docker buildx imagetools inspect \
            "$IMAGE_NAME:main" --format '{{json .Manifest}}')"
          digest="$(jq -er '.digest | select(test("^sha256:[0-9a-f]{64}$"))' <<<"$manifest_json")"
          revision="$(jq -er '
            .annotations["org.opencontainers.image.revision"]
            | select(test("^[0-9a-f]{40}$"))
          ' <<<"$manifest_json")"
          source="$(jq -er '.annotations["org.opencontainers.image.source"]' <<<"$manifest_json")"
          [[ "$digest" == "$EXPECTED_DIGEST" ]]
          [[ "$revision" == "$EXPECTED_REVISION" ]]
          [[ "$source" == "$IMAGE_SOURCE" ]]
          {
            echo "digest=$digest"
            echo "revision=$revision"
          } >>"$GITHUB_OUTPUT"
          echo "main points to $revision at $digest"

      - name: Create and queue exact Raspberry Pi deployment request
        id: create-deployment
        env:
          ACTUAL_DIGEST: ${{ steps.verify-main.outputs.digest }}
          ACTUAL_REVISION: ${{ steps.verify-main.outputs.revision }}
          EXPECTED_REPORTER_LOGIN: ${{ vars.MOON_PI_DEPLOYMENT_REPORTER_LOGIN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$ACTUAL_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$ACTUAL_REVISION" =~ ^[0-9a-f]{40}$ ]]
          [[ "$GITHUB_RUN_ID" =~ ^[0-9]+$ ]]
          [[ "$GITHUB_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          [[ "$EXPECTED_REPORTER_LOGIN" =~ ^[A-Za-z0-9][A-Za-z0-9-]{0,99}\[bot\]$ ]]

          workflow_run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          request_json="$(jq -cn \
            --arg ref "$ACTUAL_REVISION" \
            --arg repository "$IMAGE_NAME" \
            --arg digest "$ACTUAL_DIGEST" \
            --arg revision "$ACTUAL_REVISION" \
            --arg reporter_login "$EXPECTED_REPORTER_LOGIN" \
            --arg run_url "$workflow_run_url" \
            --argjson run_id "$GITHUB_RUN_ID" \
            --argjson run_attempt "$GITHUB_RUN_ATTEMPT" \
            '{
              ref: $ref,
              task: "deploy:raspberry-pi",
              auto_merge: false,
              required_contexts: [],
              payload: {
                schema_version: 1,
                image_repository: $repository,
                image_digest: $digest,
                image_revision: $revision,
                deployment_reporter_login: $reporter_login,
                workflow_run_id: $run_id,
                workflow_run_attempt: $run_attempt,
                workflow_run_url: $run_url
              },
              environment: "raspberry-pi",
              description: ("Deploy " + $revision[0:12] + " to Raspberry Pi"),
              transient_environment: false,
              production_environment: false
            }')"

          response_json="$(gh api \
            --method POST \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/deployments" \
            --input - <<<"$request_json")"

          deployment_id="$(jq -er '.id | numbers | floor | select(. > 0)' <<<"$response_json")"
          jq -e \
            --argjson deployment_id "$deployment_id" \
            --arg digest "$ACTUAL_DIGEST" \
            --arg revision "$ACTUAL_REVISION" \
            --arg repository "$IMAGE_NAME" \
            --arg reporter_login "$EXPECTED_REPORTER_LOGIN" \
            --arg run_url "$workflow_run_url" \
            --argjson run_id "$GITHUB_RUN_ID" \
            --argjson run_attempt "$GITHUB_RUN_ATTEMPT" \
            '
              .id == $deployment_id
              and .sha == $revision
              and .ref == $revision
              and .task == "deploy:raspberry-pi"
              and .environment == "raspberry-pi"
              and .transient_environment == false
              and .production_environment == false
              and .payload.schema_version == 1
              and .payload.image_repository == $repository
              and .payload.image_digest == $digest
              and .payload.image_revision == $revision
              and .payload.deployment_reporter_login == $reporter_login
              and .payload.workflow_run_id == $run_id
              and .payload.workflow_run_attempt == $run_attempt
              and .payload.workflow_run_url == $run_url
            ' <<<"$response_json" >/dev/null

          status_json="$(jq -cn \
            --arg environment raspberry-pi \
            --arg log_url "$workflow_run_url" \
            '{
              state: "queued",
              environment: $environment,
              log_url: $log_url,
              description: "Waiting for the Raspberry Pi deployment poller",
              auto_inactive: false
            }')"
          status_response_json="$(gh api \
            --method POST \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
            --input - <<<"$status_json")"
          jq -e \
            --arg environment raspberry-pi \
            --arg log_url "$workflow_run_url" \
            '
              .state == "queued"
              and .environment == $environment
              and .log_url == $log_url
            ' <<<"$status_response_json" >/dev/null

          deployments_json="$(gh api \
            --method GET \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/deployments" \
            --field environment=raspberry-pi \
            --field task='deploy:raspberry-pi' \
            --field per_page=100)"
          jq -e 'type == "array"' <<<"$deployments_json" >/dev/null
          mapfile -t prior_deployment_ids < <(jq -r \
            --argjson current_id "$deployment_id" \
            --arg repository "$IMAGE_NAME" \
            --arg digest "$ACTUAL_DIGEST" \
            --arg revision "$ACTUAL_REVISION" \
            '
              .[]
              | select(.id < $current_id)
              | select(.task == "deploy:raspberry-pi")
              | select(.environment == "raspberry-pi")
              | select((.payload | type) == "object")
              | select(.payload.schema_version == 1)
              | select(
                  .payload.image_repository != $repository
                  or .payload.image_digest != $digest
                  or .payload.image_revision != $revision)
              | .id
              | select(type == "number" and . > 0)
            ' <<<"$deployments_json")

          for prior_deployment_id in "${prior_deployment_ids[@]}"; do
            prior_statuses_json="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/deployments/$prior_deployment_id/statuses?per_page=100")"
            jq -e 'type == "array"' <<<"$prior_statuses_json" >/dev/null
            prior_state="$(jq -er '
              if length == 0 then "none" else max_by(.id).state end
            ' <<<"$prior_statuses_json")"

            case "$prior_state" in
              queued|pending|in_progress|none)
                inactive_json="$(jq -cn \
                  --arg description "Superseded by deployment $deployment_id" \
                  --arg log_url "$workflow_run_url" \
                  '{
                    state: "inactive",
                    environment: "raspberry-pi",
                    description: $description,
                    log_url: $log_url,
                    auto_inactive: false
                  }')"
                inactive_response_json="$(gh api \
                  --method POST \
                  --header 'Accept: application/vnd.github+json' \
                  --header 'X-GitHub-Api-Version: 2026-03-10' \
                  "repos/$GITHUB_REPOSITORY/deployments/$prior_deployment_id/statuses" \
                  --input - <<<"$inactive_json")"
                jq -e '.state == "inactive"' <<<"$inactive_response_json" >/dev/null
                echo "Marked deployment $prior_deployment_id inactive in favor of $deployment_id"
                ;;
              success|failure|error|inactive)
                ;;
              *)
                echo "Deployment $prior_deployment_id returned unsupported state $prior_state" >&2
                exit 1
                ;;
            esac
          done

          echo "deployment_id=$deployment_id" >>"$GITHUB_OUTPUT"
          echo "reporter_login=$EXPECTED_REPORTER_LOGIN" >>"$GITHUB_OUTPUT"
          echo "run_attempt=$GITHUB_RUN_ATTEMPT" >>"$GITHUB_OUTPUT"
          echo "Created queued deployment $deployment_id for $ACTUAL_REVISION at $ACTUAL_DIGEST"

  queue-raspberry-pi-host-config:
    name: Queue Raspberry Pi host configuration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - promote-main
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: moon-service-raspberry-pi-host-config
      cancel-in-progress: false
    steps:
      - name: Check out the promoted revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.promote-main.outputs.revision }}

      - name: Create or reuse the host-configuration request
        env:
          EXPECTED_REPORTER_LOGIN: ${{ vars.MOON_PI_DEPLOYMENT_REPORTER_LOGIN }}
          HOST_REVISION: ${{ needs.promote-main.outputs.revision }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          environment=raspberry-pi-host-config task=provision:raspberry-pi
          fingerprint="$(python3 deployment/raspberry-pi/host-contract-fingerprint.py)"
          [[ "$HOST_REVISION" =~ ^[0-9a-f]{40}$ ]]
          [[ "$fingerprint" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$EXPECTED_REPORTER_LOGIN" =~ ^[A-Za-z0-9][A-Za-z0-9-]{0,99}\[bot\]$ ]]
          deployment_pages_json="$(gh api \
            --method GET \
            --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/deployments" \
            --field environment="$environment" \
            --field task="$task" \
            --field per_page=100)"
          deployments_json="$(jq -ce \
            --arg task "$task" \
            --arg environment "$environment" \
            --arg reporter "$EXPECTED_REPORTER_LOGIN" '
              if type != "array" or any(.[]; type != "array") then
                error("invalid paginated deployment response")
              else [
                .[][]
                | select(type == "object")
                | select((.id | type) == "number" and .id > 0)
                | select(.task == $task and .environment == $environment)
                | select((.payload | type) == "object")
                | select(.payload.schema_version == 1)
                | select((.payload.host_configuration_fingerprint | type) == "string")
                | select(.payload.host_configuration_fingerprint
                    | test("^sha256:[0-9a-f]{64}$"))
                | select(.payload.deployment_reporter_login == $reporter)
              ] end
            ' <<<"$deployment_pages_json")"
          latest_deployment_id="$(jq -er 'map(.id) | max // 0' <<<"$deployments_json")"
          matching_ids_output="$(jq -r \
            --arg fingerprint "$fingerprint" \
            --arg reporter "$EXPECTED_REPORTER_LOGIN" \
            --argjson latest "$latest_deployment_id" '
              .[]
              | select(.id == $latest)
              | select(.payload.schema_version == 1)
              | select(.payload.host_configuration_fingerprint == $fingerprint)
              | select(.payload.deployment_reporter_login == $reporter)
              | .id | select(type == "number" and . > 0)
            ' <<<"$deployments_json")"
          matching_ids=()
          if [[ -n "$matching_ids_output" ]]; then
            mapfile -t matching_ids <<<"$matching_ids_output"
          fi
          deployment_id=
          for candidate_id in "${matching_ids[@]}"; do
            statuses_json="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/deployments/$candidate_id/statuses?per_page=100")"
            jq -e 'type == "array"' <<<"$statuses_json" >/dev/null
            if jq -e --arg reporter "$EXPECTED_REPORTER_LOGIN" \
                'any(.[]; .state == "success" and .creator.login == $reporter)' \
                <<<"$statuses_json" >/dev/null; then
              deployment_id="$candidate_id"
              echo "Host configuration $fingerprint already succeeded in deployment $candidate_id"
              break
            fi
            latest_state="$(jq -er \
              'if length == 0 then "none" else max_by(.id).state end' \
              <<<"$statuses_json")"
            case "$latest_state" in
              queued|pending|in_progress)
                deployment_id="$candidate_id"
                echo "Host configuration $fingerprint is already queued in deployment $candidate_id"
                break
                ;;
              none)
                gh api --method POST \
                  --header 'Accept: application/vnd.github+json' \
                  --header 'X-GitHub-Api-Version: 2026-03-10' \
                  "repos/$GITHUB_REPOSITORY/deployments/$candidate_id/statuses" \
                  --field state=queued --field environment="$environment" \
                  --field auto_inactive=false \
                  --raw-field description='Waiting for manual Ansible host convergence' >/dev/null
                deployment_id="$candidate_id"
                echo "Initialized queued host-configuration deployment $candidate_id"
                break
                ;;
              success|failure|error|inactive) ;;
              *) echo "Unsupported host deployment state $latest_state" >&2; exit 1 ;;
            esac
          done
          if [[ -z "$deployment_id" ]]; then
            workflow_run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            request_json="$(jq -cn \
            --arg ref "$HOST_REVISION" \
            --arg fingerprint "$fingerprint" \
            --arg reporter "$EXPECTED_REPORTER_LOGIN" \
            --arg run_url "$workflow_run_url" \
            --argjson run_id "$GITHUB_RUN_ID" '
              {
                ref: $ref,
                task: "provision:raspberry-pi",
                auto_merge: false, required_contexts: [],
                payload: {
                  schema_version: 1,
                  host_configuration_fingerprint: $fingerprint,
                  deployment_reporter_login: $reporter,
                  workflow_run_id: $run_id,
                  workflow_run_url: $run_url
                },
                environment: "raspberry-pi-host-config",
                description: ("Apply Pi host configuration " + $fingerprint[7:19]),
                transient_environment: false, production_environment: false
              }
              ')"
            response_json="$(gh api --method POST \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/deployments" --input - <<<"$request_json")"
            deployment_id="$(jq -er '.id | numbers | floor | select(. > 0)' <<<"$response_json")"
            jq -e --arg fingerprint "$fingerprint" --arg revision "$HOST_REVISION" \
            --arg reporter "$EXPECTED_REPORTER_LOGIN" '
            .sha == $revision
            and .task == "provision:raspberry-pi"
            and .environment == "raspberry-pi-host-config"
            and .payload.schema_version == 1
            and .payload.host_configuration_fingerprint == $fingerprint
            and .payload.deployment_reporter_login == $reporter
            ' <<<"$response_json" >/dev/null
            gh api --method POST \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
            --field state=queued --field environment="$environment" \
            --field auto_inactive=false --raw-field log_url="$workflow_run_url" \
              --raw-field description='Waiting for manual Ansible host convergence' >/dev/null
          fi
          superseded_ids_output="$(jq -r \
            --argjson current "$deployment_id" '
              .[]
              | select(.id != $current)
              | .id | select(type == "number" and . > 0)
            ' <<<"$deployments_json")"
          superseded_ids=()
          if [[ -n "$superseded_ids_output" ]]; then
            mapfile -t superseded_ids <<<"$superseded_ids_output"
          fi
          for superseded_id in "${superseded_ids[@]}"; do
            statuses_json="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              "repos/$GITHUB_REPOSITORY/deployments/$superseded_id/statuses?per_page=1")"
            prior_state="$(jq -er \
              'if length == 0 then "none" else max_by(.id).state end' \
              <<<"$statuses_json")"
            case "$prior_state" in
              none|queued|pending|in_progress)
                gh api --method POST \
                  --header 'Accept: application/vnd.github+json' \
                  --header 'X-GitHub-Api-Version: 2026-03-10' \
                  "repos/$GITHUB_REPOSITORY/deployments/$superseded_id/statuses" \
                  --field state=inactive --field environment="$environment" \
                  --field auto_inactive=false \
                  --raw-field description="Superseded by host deployment $deployment_id" >/dev/null
                ;;
              success|failure|error|inactive) ;;
              *) echo "Unsupported prior host deployment state $prior_state" >&2; exit 1 ;;
            esac
          done
          echo "Host-configuration deployment $deployment_id represents $fingerprint"

  confirm-raspberry-pi:
    name: Confirm Raspberry Pi deployment
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - promote-main
    runs-on: ubuntu-24.04
    timeout-minutes: 17
    permissions:
      deployments: read
    steps:
      - name: Wait for exact Raspberry Pi deployment status
        env:
          DEPLOYMENT_ID: ${{ needs.promote-main.outputs.deployment_id }}
          EXPECTED_DIGEST: ${{ needs.promote-main.outputs.digest }}
          EXPECTED_REPORTER_LOGIN: ${{ needs.promote-main.outputs.reporter_login }}
          EXPECTED_REVISION: ${{ needs.promote-main.outputs.revision }}
          EXPECTED_RUN_ATTEMPT: ${{ needs.promote-main.outputs.run_attempt }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$DEPLOYMENT_ID" =~ ^[0-9]+$ ]]
          [[ "$EXPECTED_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$EXPECTED_REVISION" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_REPORTER_LOGIN" =~ ^[A-Za-z0-9][A-Za-z0-9-]{0,99}\[bot\]$ ]]
          [[ "$GITHUB_RUN_ID" =~ ^[0-9]+$ ]]
          [[ "$EXPECTED_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]

          workflow_run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          deployment_json="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$GITHUB_REPOSITORY/deployments/$DEPLOYMENT_ID")"
          jq -e \
            --argjson deployment_id "$DEPLOYMENT_ID" \
            --arg digest "$EXPECTED_DIGEST" \
            --arg revision "$EXPECTED_REVISION" \
            --arg repository "$IMAGE_NAME" \
            --arg reporter_login "$EXPECTED_REPORTER_LOGIN" \
            --arg run_url "$workflow_run_url" \
            --argjson run_id "$GITHUB_RUN_ID" \
            --argjson run_attempt "$EXPECTED_RUN_ATTEMPT" \
            '
              .id == $deployment_id
              and .sha == $revision
              and .ref == $revision
              and .task == "deploy:raspberry-pi"
              and .environment == "raspberry-pi"
              and .transient_environment == false
              and .production_environment == false
              and .payload.schema_version == 1
              and .payload.image_repository == $repository
              and .payload.image_digest == $digest
              and .payload.image_revision == $revision
              and .payload.deployment_reporter_login == $reporter_login
              and .payload.workflow_run_id == $run_id
              and .payload.workflow_run_attempt == $run_attempt
              and .payload.workflow_run_url == $run_url
            ' <<<"$deployment_json" >/dev/null

          deadline=$((SECONDS + 900))
          last_status_id=""
          consecutive_status_read_failures=0

          retry_status_read() {
            local reason="$1"
            local delay remaining
            consecutive_status_read_failures=$((consecutive_status_read_failures + 1))
            if (( consecutive_status_read_failures > 3 )); then
              echo "Unable to read deployment status after 3 retries: $reason" >&2
              return 1
            fi
            delay=$((5 * (1 << (consecutive_status_read_failures - 1))))
            remaining=$((deadline - SECONDS))
            (( remaining > 0 )) || return 0
            (( delay <= remaining )) || delay="$remaining"
            echo "::warning::Unable to read deployment status ($reason); retrying in ${delay}s"
            sleep "$delay"
          }

          while true; do
            if ! statuses_json="$(gh api \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/$GITHUB_REPOSITORY/deployments/$DEPLOYMENT_ID/statuses?per_page=100")"; then
              (( SECONDS < deadline )) || break
              retry_status_read "GitHub API request failed" || exit 1
              continue
            fi
            jq -e '
              type == "array"
              and all(.[];
                (.id | type) == "number"
                and (.state | type) == "string"
                and (.creator.login | type) == "string"
                and .environment == "raspberry-pi")
            ' <<<"$statuses_json" >/dev/null

            if [[ "$(jq -er 'length' <<<"$statuses_json")" == 0 ]]; then
              (( SECONDS < deadline )) || break
              retry_status_read "GitHub returned an empty status list" || exit 1
              continue
            fi
            consecutive_status_read_failures=0

            if successful_status="$(jq -cer --arg reporter "$EXPECTED_REPORTER_LOGIN" '
                [.[] | select(
                  .state == "success" and .creator.login == $reporter)]
                | if length == 0 then empty else max_by(.id) end
              ' <<<"$statuses_json")"; then
              status_id="$(jq -er '.id | numbers | floor | select(. > 0)' \
                <<<"$successful_status")"
              creator="$(jq -er '.creator.login' <<<"$successful_status")"
              echo "Deployment $DEPLOYMENT_ID reached success in status $status_id (reported by $creator)"
              echo "Raspberry Pi confirmed $EXPECTED_REVISION at $EXPECTED_DIGEST"
              exit 0
            fi

            latest_status="$(jq -cer 'max_by(.id)' <<<"$statuses_json")"
            status_id="$(jq -er '.id | numbers | floor | select(. > 0)' <<<"$latest_status")"
            state="$(jq -er '.state' <<<"$latest_status")"
            creator="$(jq -er '.creator.login' <<<"$latest_status")"

            if [[ "$status_id" != "$last_status_id" ]]; then
              echo "Deployment $DEPLOYMENT_ID is $state (reported by $creator)"
              last_status_id="$status_id"
            fi

            case "$state" in
              success)
                echo "Deployment $DEPLOYMENT_ID received success from unexpected actor $creator" >&2
                exit 1
                ;;
              failure|error)
                echo "Raspberry Pi deployment $DEPLOYMENT_ID reported $state" >&2
                exit 1
                ;;
              inactive)
                echo "Deployment $DEPLOYMENT_ID was superseded without exact confirmation" >&2
                exit 1
                ;;
              queued|pending|in_progress)
                ;;
              *)
                echo "Deployment $DEPLOYMENT_ID returned unsupported state $state" >&2
                exit 1
                ;;
            esac

            remaining=$((deadline - SECONDS))
            (( remaining > 0 )) || break
            if (( remaining < 15 )); then
              sleep "$remaining"
            else
              sleep 15
            fi
          done

          echo "Raspberry Pi did not confirm deployment $DEPLOYMENT_ID within 15 minutes" >&2
          exit 1
