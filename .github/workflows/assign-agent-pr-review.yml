name: Assign Agent Pull Request Review

on:
  pull_request_target:
    types:
      - opened
      - ready_for_review
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  assign-review:
    name: Assign Human Review
    if: >-
      github.event.pull_request.user.login == 'moon-service-agent' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Assign owner and request review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          OWNER_REVIEWER: rapucha
        run: >-
          gh pr edit "$PR_NUMBER"
          --repo "$REPO"
          --add-assignee "$OWNER_REVIEWER"
          --add-reviewer "$OWNER_REVIEWER"
