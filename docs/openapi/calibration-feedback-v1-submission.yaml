components:
  schemas:
    OpportunityId:
      type: string
      minLength: 1
      description: |
        Opaque claimed identifier copied from the loaded opportunity. Exact
        string validation and the trusted-alpha boundary are defined in
        docs/api-shape.md.
    AmbientLight:
      type: string
      enum:
        - good
        - too_bright
        - too_dark
    CrescentVisibility:
      type: string
      enum:
        - visible
        - too_small_to_see
    Notes:
      type: string
      description: |
        Optional free text. NFC, outer Unicode White_Space removal, U+0000
        rejection, and the post-normalization 1-4,000 code-point bound are
        defined in docs/api-shape.md.
    SubmissionRequest:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - clientSubmissionId
        - locationId
        - opportunityId
      properties:
        schemaVersion:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/SchemaVersion"
        clientSubmissionId:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/UuidV4"
        locationId:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/LocationId"
        opportunityId:
          $ref: "#/components/schemas/OpportunityId"
        ambientLight:
          $ref: "#/components/schemas/AmbientLight"
        crescentVisibility:
          $ref: "#/components/schemas/CrescentVisibility"
        notes:
          $ref: "#/components/schemas/Notes"
      anyOf:
        - required:
            - ambientLight
        - required:
            - crescentVisibility
        - required:
            - notes
    SubmissionResponse:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - serverTime
        - status
        - clientSubmissionId
        - serverReportId
        - submittedAt
      properties:
        schemaVersion:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/SchemaVersion"
        serverTime:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/UtcInstant"
        status:
          type: string
          enum:
            - created
            - replayed
        clientSubmissionId:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/UuidV4"
        serverReportId:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/UuidV4"
        submittedAt:
          $ref: "./calibration-feedback-v1-common.yaml#/components/schemas/UtcInstant"
    CreatedSubmissionResponse:
      allOf:
        - $ref: "#/components/schemas/SubmissionResponse"
        - type: object
          properties:
            status:
              const: created
    ReplayedSubmissionResponse:
      allOf:
        - $ref: "#/components/schemas/SubmissionResponse"
        - type: object
          properties:
            status:
              const: replayed
