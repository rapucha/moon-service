---
- name: Test preview-storage validation without host mutation
  hosts: all
  gather_facts: false
  vars:
    ansible_facts:
      distribution: Debian
      distribution_major_version: "13"
      distribution_release: trixie
      architecture: aarch64
    _preview_storage_test_server: >-
      {{ ['192', '168', '254', '254'] | join('.') }}
    _preview_storage_test_source: >-
      {{ _preview_storage_test_server }}:/test/moon_service_preview
    _preview_storage_safe_nfs: >-
      {{ {
           'filesystems': [
             {
               'source': _preview_storage_test_source,
               'target': '/mnt/moon-service-preview',
               'fstype': 'nfs4',
               'options': 'rw,nosuid,nodev,noexec,vers=4.1,hard,proto=tcp'
             }
           ]
         } | to_json }}
    _preview_storage_inactive_autofs: >-
      {{ {
           'filesystems': [
             {
               'source': 'systemd-1',
               'target': '/mnt/moon-service-preview',
               'fstype': 'autofs',
               'options': 'rw,relatime'
             }
           ]
         } | to_json }}
    _preview_storage_foreign_mount: >-
      {{ {
           'filesystems': [
             {
               'source': '/dev/mmcblk0p2',
               'target': '/mnt/moon-service-preview',
               'fstype': 'ext4',
               'options': 'rw,relatime'
             }
           ]
         } | to_json }}
  tasks:
    - name: Accept a valid synthetic private inventory
      ansible.builtin.include_role:
        name: moon_service_preview_storage
        tasks_from: validate-inventory
      vars:
        moon_service_preview_storage_server: "{{ _preview_storage_test_server }}"
        moon_service_preview_storage_export: /test/moon_service_preview
        moon_service_preview_storage_confirm_client_allowlist: true
        moon_service_preview_storage_confirm_root_squash: true
        moon_service_preview_storage_confirm_sync: true
        moon_service_preview_storage_confirm_trusted_lan: true

    - name: Start documentation-endpoint rejection evidence
      ansible.builtin.set_fact:
        _preview_storage_documentation_endpoint_rejected: false

    - name: Exercise documentation-endpoint rejection
      block:
        - name: Try a documentation-only server address
          ansible.builtin.include_role:
            name: moon_service_preview_storage
            tasks_from: validate-inventory
          vars:
            moon_service_preview_storage_server: 192.0.2.38
            moon_service_preview_storage_export: /test/moon_service_preview
            moon_service_preview_storage_confirm_client_allowlist: true
            moon_service_preview_storage_confirm_root_squash: true
            moon_service_preview_storage_confirm_sync: true
            moon_service_preview_storage_confirm_trusted_lan: true
      rescue:
        - name: Record documentation-endpoint rejection
          ansible.builtin.set_fact:
            _preview_storage_documentation_endpoint_rejected: true

    - name: Require documentation-endpoint rejection
      ansible.builtin.assert:
        that:
          - _preview_storage_documentation_endpoint_rejected | bool

    - name: Start malformed-export rejection evidence
      ansible.builtin.set_fact:
        _preview_storage_malformed_export_rejected: false

    - name: Exercise malformed-export rejection
      block:
        - name: Try an export with a parent segment
          ansible.builtin.include_role:
            name: moon_service_preview_storage
            tasks_from: validate-inventory
          vars:
            moon_service_preview_storage_server: "{{ _preview_storage_test_server }}"
            moon_service_preview_storage_export: /test/../moon_service_preview
            moon_service_preview_storage_confirm_client_allowlist: true
            moon_service_preview_storage_confirm_root_squash: true
            moon_service_preview_storage_confirm_sync: true
            moon_service_preview_storage_confirm_trusted_lan: true
      rescue:
        - name: Record malformed-export rejection
          ansible.builtin.set_fact:
            _preview_storage_malformed_export_rejected: true

    - name: Require malformed-export rejection
      ansible.builtin.assert:
        that:
          - _preview_storage_malformed_export_rejected | bool

    - name: Start missing-confirmation rejection evidence
      ansible.builtin.set_fact:
        _preview_storage_missing_confirmation_rejected: false

    - name: Exercise missing-confirmation rejection
      block:
        - name: Try an unconfirmed client allowlist
          ansible.builtin.include_role:
            name: moon_service_preview_storage
            tasks_from: validate-inventory
          vars:
            moon_service_preview_storage_server: "{{ _preview_storage_test_server }}"
            moon_service_preview_storage_export: /test/moon_service_preview
            moon_service_preview_storage_confirm_client_allowlist: false
            moon_service_preview_storage_confirm_root_squash: true
            moon_service_preview_storage_confirm_sync: true
            moon_service_preview_storage_confirm_trusted_lan: true
      rescue:
        - name: Record missing-confirmation rejection
          ansible.builtin.set_fact:
            _preview_storage_missing_confirmation_rejected: true

    - name: Require missing-confirmation rejection
      ansible.builtin.assert:
        that:
          - _preview_storage_missing_confirmation_rejected | bool

    - name: Accept a safe active NFS mount from the previous managed contract
      ansible.builtin.include_role:
        name: moon_service_preview_storage
        tasks_from: validate-current-mount
      vars:
        _moon_service_preview_storage_mount_before:
          rc: 0
          stdout: "{{ _preview_storage_safe_nfs }}"
        _moon_service_preview_storage_source: "{{ _preview_storage_test_source }}"
        _moon_service_preview_storage_exact_fstab_present: false
        _moon_service_preview_storage_previous_fstab_present: true
        _moon_service_preview_storage_automount_before:
          rc: 0

    - name: Accept the expected inactive autofs classification
      ansible.builtin.include_role:
        name: moon_service_preview_storage
        tasks_from: validate-current-mount
      vars:
        _moon_service_preview_storage_mount_before:
          rc: 0
          stdout: "{{ _preview_storage_inactive_autofs }}"
        _moon_service_preview_storage_source: "{{ _preview_storage_test_source }}"
        _moon_service_preview_storage_exact_fstab_present: true
        _moon_service_preview_storage_automount_before:
          rc: 0

    - name: Start foreign-mount rejection evidence
      ansible.builtin.set_fact:
        _preview_storage_foreign_mount_rejected: false

    - name: Exercise foreign-mount rejection
      block:
        - name: Try a foreign filesystem at the fixed target
          ansible.builtin.include_role:
            name: moon_service_preview_storage
            tasks_from: validate-current-mount
          vars:
            _moon_service_preview_storage_mount_before:
              rc: 0
              stdout: "{{ _preview_storage_foreign_mount }}"
            _moon_service_preview_storage_source: "{{ _preview_storage_test_source }}"
            _moon_service_preview_storage_exact_fstab_present: true
            _moon_service_preview_storage_automount_before:
              rc: 0
      rescue:
        - name: Record foreign-mount rejection
          ansible.builtin.set_fact:
            _preview_storage_foreign_mount_rejected: true

    - name: Require foreign-mount rejection
      ansible.builtin.assert:
        that:
          - _preview_storage_foreign_mount_rejected | bool

    - name: Start unowned-autofs rejection evidence
      ansible.builtin.set_fact:
        _preview_storage_unowned_autofs_rejected: false

    - name: Exercise unowned-autofs rejection
      block:
        - name: Try an automount without the exact fstab contract
          ansible.builtin.include_role:
            name: moon_service_preview_storage
            tasks_from: validate-current-mount
          vars:
            _moon_service_preview_storage_mount_before:
              rc: 0
              stdout: "{{ _preview_storage_inactive_autofs }}"
            _moon_service_preview_storage_source: "{{ _preview_storage_test_source }}"
            _moon_service_preview_storage_exact_fstab_present: false
            _moon_service_preview_storage_automount_before:
              rc: 0
      rescue:
        - name: Record unowned-autofs rejection
          ansible.builtin.set_fact:
            _preview_storage_unowned_autofs_rejected: true

    - name: Require unowned-autofs rejection
      ansible.builtin.assert:
        that:
          - _preview_storage_unowned_autofs_rejected | bool
