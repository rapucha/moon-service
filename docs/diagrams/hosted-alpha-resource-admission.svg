<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="297mm" height="210mm" viewBox="0 0 1684 1191" role="img" aria-labelledby="title desc">
  <title id="title">Moon Service hosted-alpha admission by route</title>
  <desc id="desc">Three-lane overview showing the HTTP filter owning whole-site admission and HostedAlphaProviderAdmission owning provider admission shared by opportunities and new feedback location resolution.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16836f"/>
    </marker>
    <style>
      @page { size: A4 landscape; margin: 0; }
      text { font-family: "DejaVu Sans", Arial, sans-serif; fill: #14213d; }
      .eyebrow { font-size: 14px; font-weight: 800; letter-spacing: 2.1px; fill: #16836f; }
      .title { font-size: 43px; font-weight: 760; letter-spacing: -1.2px; }
      .subtitle { font-size: 19px; fill: #516077; }
      .badge { font-size: 13px; font-weight: 760; letter-spacing: 0.7px; }
      .panel-title { font-size: 19px; font-weight: 760; }
      .lane-name { font-size: 13px; font-weight: 820; letter-spacing: 0.8px; }
      .node-title { font-size: 15px; font-weight: 780; text-anchor: middle; }
      .node-copy { font-size: 12px; font-weight: 560; text-anchor: middle; fill: #5e6c80; }
      .edge { font-size: 11px; font-weight: 700; text-anchor: middle; fill: #5e6c80; }
      .card-title { font-size: 17px; font-weight: 780; }
      .card-copy { font-size: 13px; font-weight: 540; fill: #445269; }
      .metric { font-size: 13px; font-weight: 760; }
      .small { font-size: 11px; font-weight: 560; fill: #657389; }
      .footer { font-size: 11px; font-weight: 650; fill: #627086; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .bypass { stroke: #16836f; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrowGreen); }
    </style>
  </defs>

  <rect width="1684" height="1191" fill="#f3f6fa"/>
  <circle cx="1574" cy="-16" r="196" fill="#e6f4ef"/>
  <circle cx="1640" cy="26" r="74" fill="#bde5d7" opacity="0.65"/>

  <text x="58" y="47" class="eyebrow">MOON SERVICE · HOSTED ALPHA</text>
  <text x="58" y="96" class="title">Admission by route</text>
  <text x="58" y="128" class="subtitle">Feedback skips whole-site admission; new-report location resolution still shares provider admission with opportunities.</text>

  <g transform="translate(1350 52)">
    <rect x="0" y="0" width="112" height="32" rx="16" fill="#dfeaf8"/>
    <text x="56" y="21" class="badge" text-anchor="middle" fill="#245a91">ISSUE #185</text>
    <rect x="120" y="0" width="96" height="32" rx="16" fill="#e6f4ef"/>
    <text x="168" y="21" class="badge" text-anchor="middle" fill="#13705f">PR #186</text>
  </g>

  <rect x="40" y="154" width="1604" height="688" rx="22" fill="#ffffff"/>
  <text x="66" y="189" class="panel-title">Three request paths · separate HTTP-filter and provider-admission owners</text>
  <rect x="1262" y="170" width="354" height="29" rx="14.5" fill="#fff7df"/>
  <text x="1439" y="189" class="badge" text-anchor="middle" fill="#8a5a00">SHARED BY ALL VISITORS</text>

  <!-- Opportunity lane -->
  <rect x="66" y="216" width="1552" height="142" rx="18" fill="#f4f7fb" stroke="#d9e2ed"/>
  <text x="84" y="239" class="lane-name" fill="#245a91">OPPORTUNITY</text>
  <rect x="84" y="253" width="260" height="78" rx="13" fill="#e6eef9" stroke="#9cb8dd"/>
  <text x="214" y="282" class="node-title" fill="#245a91">GET / HEAD opportunities</text>
  <text x="214" y="305" class="node-copy">Funnel or LAN caller</text>

  <line x1="344" y1="292" x2="402" y2="292" class="arrow"/>
  <rect x="410" y="253" width="264" height="78" rx="13" fill="#dff4ed" stroke="#80cbb7"/>
  <text x="542" y="280" class="node-title" fill="#0b6757">HTTP resource-limit filter</text>
  <text x="542" y="303" class="node-copy">owns whole-site TB: 40 · +1 / second</text>
  <text x="542" y="346" class="edge">empty → filter returns 429 + Retry-After</text>

  <line x1="674" y1="292" x2="744" y2="292" class="arrow"/>
  <rect x="752" y="242" width="362" height="100" rx="14" fill="#f1edfb" stroke="#b7a4e8"/>
  <text x="933" y="270" class="node-title" fill="#5d3aa2">HostedAlphaProviderAdmission</text>
  <text x="933" y="293" class="node-copy">fair Semaphore: 2 permits · no queue</text>
  <text x="933" y="314" class="node-copy">then TokenBucket: 10 credits · +1 / minute</text>
  <text x="933" y="357" class="edge">refusal result → filter maps 429 + Retry-After</text>

  <line x1="1114" y1="292" x2="1198" y2="292" class="arrow"/>
  <rect x="1206" y="253" width="388" height="78" rx="13" fill="#e8f1f8" stroke="#9bbbd3"/>
  <text x="1400" y="276" class="node-title" fill="#20556f">Surface → controller → caches</text>
  <text x="1400" y="298" class="node-copy">Open-Meteo only on a miss</text>
  <text x="1400" y="318" class="node-copy">filter closes lease after downstream</text>

  <!-- Capability lane -->
  <rect x="66" y="378" width="1552" height="116" rx="18" fill="#f0faf7" stroke="#b9dfd3"/>
  <text x="84" y="401" class="lane-name" fill="#13705f">FEEDBACK CAPABILITY</text>
  <rect x="84" y="414" width="322" height="58" rx="13" fill="#e8f7f2" stroke="#94d1c1"/>
  <text x="245" y="439" class="node-title" fill="#126c5c">Exact capability path</text>
  <text x="245" y="459" class="node-copy">GET /api/calibration-feedback/v1/capability</text>

  <path d="M 406 443 C 482 443, 510 417, 578 417 L 744 417" class="bypass"/>
  <text x="575" y="405" class="edge" fill="#13705f">bypass whole-site TokenBucket</text>
  <rect x="752" y="407" width="362" height="66" rx="13" fill="#e6eef9" stroke="#9cb8dd"/>
  <text x="933" y="434" class="node-title" fill="#245a91">Surface + feature/repository status</text>
  <text x="933" y="456" class="node-copy">never enters shared provider admission</text>

  <line x1="1114" y1="440" x2="1198" y2="440" class="arrow"/>
  <rect x="1206" y="407" width="388" height="66" rx="13" fill="#edf4fb" stroke="#b7cce4"/>
  <text x="1400" y="434" class="node-title" fill="#245a91">200 capability · no-store</text>
  <text x="1400" y="456" class="node-copy">current state, not a reservation</text>

  <!-- Submission lane -->
  <rect x="66" y="514" width="1552" height="214" rx="18" fill="#faf8ff" stroke="#ddd4f2"/>
  <text x="84" y="537" class="lane-name" fill="#5d3aa2">FEEDBACK SUBMISSION</text>
  <rect x="84" y="552" width="294" height="72" rx="13" fill="#eee9fb" stroke="#b7a4e8"/>
  <text x="231" y="575" class="node-title" fill="#5d3aa2">Exact submission path</text>
  <text x="231" y="597" class="node-copy">POST /api/calibration-feedback/v1/</text>
  <text x="231" y="614" class="node-copy">submissions</text>

  <path d="M 378 588 L 428 588" class="bypass"/>
  <text x="403" y="576" class="edge" fill="#13705f">bypass</text>
  <rect x="436" y="542" width="316" height="92" rx="13" fill="#f6f8fb" stroke="#c9d3df"/>
  <text x="594" y="568" class="node-title">Bound, parse, normalize</text>
  <text x="594" y="590" class="node-copy">feature + UUID lookup</text>
  <text x="594" y="611" class="node-copy">repository status + capacity</text>

  <line x1="752" y1="588" x2="798" y2="588" class="arrow"/>
  <text x="775" y="576" class="edge">new</text>
  <rect x="806" y="538" width="336" height="100" rx="14" fill="#f1edfb" stroke="#b7a4e8"/>
  <text x="974" y="566" class="node-title" fill="#5d3aa2">HostedAlphaProviderAdmission</text>
  <text x="974" y="589" class="node-copy">try permit, then spend provider credit</text>
  <text x="974" y="610" class="node-copy">permit spans location resolution only</text>
  <text x="974" y="630" class="edge" fill="#9e3434">refusal → 503 feedback_unavailable</text>

  <line x1="1142" y1="588" x2="1198" y2="588" class="arrow"/>
  <rect x="1206" y="538" width="388" height="100" rx="13" fill="#e8f1f8" stroke="#9bbbd3"/>
  <text x="1400" y="565" class="node-title" fill="#20556f">Resolve canonical location ID</text>
  <text x="1400" y="587" class="node-copy">resolver cache / geocoder on a miss</text>
  <text x="1400" y="608" class="node-copy">then release provider permit</text>

  <rect x="436" y="652" width="706" height="54" rx="12" fill="#fff5df" stroke="#e4b964"/>
  <text x="789" y="675" class="node-title" fill="#8a5a00">Terminal before provider admission</text>
  <text x="789" y="695" class="node-copy">validation, disabled/unavailable/full, replay, or conflict outcome</text>
  <rect x="1206" y="652" width="388" height="54" rx="12" fill="#e8f7f2" stroke="#94d1c1"/>
  <text x="1400" y="675" class="node-title" fill="#126c5c">Feedback-owned tail</text>
  <text x="1400" y="695" class="node-copy">location outcome → write limiter → astronomy → store</text>

  <!-- Compact route callouts -->
  <rect x="84" y="750" width="730" height="58" rx="13" fill="#f5f7fa" stroke="#d7dee8"/>
  <text x="104" y="775" class="metric">Exact Docker readiness probe</text>
  <text x="335" y="775" class="card-copy">bypasses all admission controls.</text>
  <text x="104" y="797" class="metric">Other hosted routes</text>
  <text x="269" y="797" class="card-copy">use whole-site admission only, then surface policy.</text>
  <rect x="838" y="750" width="756" height="58" rx="13" fill="#fff8e8" stroke="#ead19a"/>
  <text x="858" y="775" class="metric" fill="#8a5a00">Provider credits admit work.</text>
  <text x="1082" y="775" class="card-copy">A cache hit or downstream failure does not return one.</text>
  <text x="858" y="797" class="metric" fill="#8a5a00">Feedback write limiting is separate.</text>
  <text x="1137" y="797" class="card-copy">It runs only after location resolution.</text>

  <!-- Bottom explanation cards -->
  <g transform="translate(40 866)">
    <rect x="0" y="0" width="500" height="260" rx="20" fill="#ffffff"/>
    <rect x="0" y="0" width="7" height="260" rx="3.5" fill="#16836f"/>
    <text x="28" y="38" class="card-title">Route matrix</text>
    <text x="28" y="70" class="metric">Opportunity</text>
    <text x="144" y="70" class="card-copy">whole-site + shared provider admission</text>
    <text x="28" y="100" class="metric">Capability</text>
    <text x="144" y="100" class="card-copy">neither admission control</text>
    <text x="28" y="130" class="metric">New feedback</text>
    <text x="144" y="130" class="card-copy">provider admission after cheap checks</text>
    <text x="28" y="160" class="metric">Other routes</text>
    <text x="144" y="160" class="card-copy">whole-site only</text>
    <text x="28" y="190" class="metric">Docker probe</text>
    <text x="144" y="190" class="card-copy">neither admission control</text>
  </g>

  <g transform="translate(562 866)">
    <rect x="0" y="0" width="510" height="260" rx="20" fill="#ffffff"/>
    <rect x="0" y="0" width="7" height="260" rx="3.5" fill="#d29a24"/>
    <text x="28" y="38" class="card-title">Refusal contract</text>
    <text x="28" y="72" class="card-copy">• Whole-site exhaustion: 429 + computed Retry-After.</text>
    <text x="28" y="105" class="card-copy">• Opportunity permit refusal: filter returns 429 + Retry-After: 1.</text>
    <text x="28" y="138" class="card-copy">• Opportunity token refusal: filter returns 429 + retry hint.</text>
    <text x="28" y="171" class="card-copy">• Feedback shared-gate refusal: 503 feedback_unavailable.</text>
    <text x="28" y="204" class="card-copy">• Feedback's later write limiter can return its own 429.</text>
    <text x="28" y="232" class="small">Public feedback errors never reveal which shared guard refused work.</text>
  </g>

  <g transform="translate(1094 866)">
    <rect x="0" y="0" width="550" height="260" rx="20" fill="#ffffff"/>
    <rect x="0" y="0" width="7" height="260" rx="3.5" fill="#7354b8"/>
    <text x="28" y="38" class="card-title">HostedAlphaProviderAdmission</text>
    <text x="28" y="72" class="card-copy">• One fair two-permit Semaphore is process-wide.</text>
    <text x="28" y="105" class="card-copy">• One 10-credit TokenBucket refills once per minute.</text>
    <text x="28" y="138" class="card-copy">• Opportunity holds a permit through its full filter chain.</text>
    <text x="28" y="171" class="card-copy">• Feedback holds a permit only while resolving location.</text>
    <rect x="28" y="190" width="494" height="48" rx="12" fill="#f1edfb"/>
    <text x="44" y="211" class="metric" fill="#5d3aa2">Uninterrupted 24-hour proof</text>
    <text x="44" y="230" class="small">1,450 shared admissions × at most 4 attempts = 5,800 attempts.</text>
  </g>

  <text x="40" y="1166" class="footer">Current implementation · issue #185 / PR #186 · Initial controls: issue #165 / PR #178 · Bounds: issue #120 / PR #133.</text>
  <text x="1644" y="1166" class="footer" text-anchor="end">Moon Service · 2026-07-21</text>
</svg>
